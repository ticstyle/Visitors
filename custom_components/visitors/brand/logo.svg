<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="600" height="150">
  <defs>
    <linearGradient id="visitors-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  
  <!-- Icon Brandmark Container -->
  <rect x="15" y="15" width="120" height="120" rx="28" fill="url(#visitors-grad)" />
  
  <!-- Miniature Icon Graphics Scale-Down -->
  <g transform="translate(15, 15) scale(0.234375)">
    <!-- Radar / Zone Waves -->
    <circle cx="256" cy="280" r="150" fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity="0.15" stroke-dasharray="12 12" />
    <circle cx="256" cy="280" r="200" fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity="0.08" stroke-dasharray="16 16" />
    
    <!-- Welcoming House Frame -->
    <path d="M256 100 L110 220 L150 220 V390 C150 401 159 410 170 410 H342 C353 410 362 401 362 390 V220 L402 220 Z" 
          fill="none" stroke="#ffffff" stroke-width="20" stroke-linejoin="round" stroke-linecap="round" />
    
    <!-- Left Visitor -->
    <circle cx="205" cy="280" r="24" fill="#ffffff" fill-opacity="0.5" />
    <path d="M165 390 C165 330 180 320 205 320 C230 320 245 330 245 390" fill="#ffffff" fill-opacity="0.5" />
    
    <!-- Right Visitor -->
    <circle cx="307" cy="280" r="24" fill="#ffffff" fill-opacity="0.5" />
    <path d="M267 390 C267 330 282 320 307 320 C332 320 347 330 347 390" fill="#ffffff" fill-opacity="0.5" />
    
    <!-- Center Visitor -->
    <circle cx="256" cy="250" r="32" fill="#ffffff" />
    <path d="M196 390 C196 315 215 300 256 300 C297 300 316 315 316 390" fill="#ffffff" />
    
    <!-- Location Dot -->
    <circle cx="256" cy="355" r="10" fill="#ffffff" fill-opacity="0.8" />
  </g>
  
  <!-- Brand Typography -->
  <text x="160" y="90" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="url(#visitors-grad)" letter-spacing="-1.5px">Visitors</text>
  <text x="163" y="118" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#94a3b8" letter-spacing="4px">HOME ASSISTANT INTEGRATION</text>
</svg>

